services:
  postgres:
    container_name: identity_postgres
    image: postgres:16
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: identity_redis
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: