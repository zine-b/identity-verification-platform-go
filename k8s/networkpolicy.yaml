apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: identity-api-egress
  namespace: identity

spec:
  podSelector:
    matchLabels:
      app: identity-api

  policyTypes:
    - Egress
    - Ingress

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432

    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080