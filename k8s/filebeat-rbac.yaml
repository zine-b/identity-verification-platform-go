apiVersion: v1
kind: ServiceAccount

metadata:
  name: filebeat
  namespace: identity

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: filebeat

rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: filebeat

subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: identity

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: filebeat