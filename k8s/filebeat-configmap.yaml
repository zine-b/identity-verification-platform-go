apiVersion: v1
kind: ConfigMap

metadata:
  name: filebeat-config
  namespace: identity

data:
  filebeat.yml: |
    filebeat.inputs:
      - type: filestream
        id: kubernetes-container-logs

        paths:
          - /var/log/containers/*.log

        parsers:
          - container:
              stream: all
              format: auto

        prospector.scanner.symlinks: true

        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"

          - drop_event:
              when:
                not:
                  equals:
                    kubernetes.container.name: "api"

    output.logstash:
      hosts:
        - "logstash:5044"

    logging.level: info
    logging.to_stderr: true